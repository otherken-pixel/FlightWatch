<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001233"/>
      <stop offset="100%" stop-color="#0077B6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#48CAE4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#001233" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" fill="url(#bg)"/>
  <rect width="180" height="180" fill="url(#shine)"/>
  <!-- Radar rings -->
  <circle cx="90" cy="90" r="66" fill="none" stroke="#48CAE4" stroke-opacity="0.12" stroke-width="1.5"/>
  <circle cx="90" cy="90" r="47" fill="none" stroke="#48CAE4" stroke-opacity="0.18" stroke-width="1.5"/>
  <circle cx="90" cy="90" r="28" fill="none" stroke="#48CAE4" stroke-opacity="0.25" stroke-width="1.5"/>
  <!-- Airplane -->
  <g transform="translate(90,86) rotate(-45)">
    <path d="M0-50 C4-47 7-31 7-14 L24-5.5 C26-4 26 0 24 1.5 L7 9 C7 25 4 43 0 50 C-4 43 -7 25 -7 9 L-24 1.5 C-26 0 -26-4 -24-5.5 L-7-14 C-7-31 -4-47 0-50Z" fill="white" opacity="0.95"/>
    <!-- Tail fin -->
    <path d="M0 33 L5.5 43 L0 39 L-5.5 43Z" fill="white" opacity="0.8"/>
  </g>
  <!-- Tracking dot -->
  <circle cx="112" cy="65" r="4.5" fill="#48CAE4" opacity="0.9"/>
  <circle cx="112" cy="65" r="8" fill="#48CAE4" opacity="0.3"/>
</svg>
