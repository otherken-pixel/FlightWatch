<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001233"/>
      <stop offset="100%" stop-color="#0077B6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#48CAE4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#001233" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <rect width="100" height="100" rx="22" fill="url(#shine)"/>
  <!-- Radar rings -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="#48CAE4" stroke-opacity="0.12" stroke-width="1"/>
  <circle cx="50" cy="50" r="26" fill="none" stroke="#48CAE4" stroke-opacity="0.18" stroke-width="1"/>
  <circle cx="50" cy="50" r="16" fill="none" stroke="#48CAE4" stroke-opacity="0.25" stroke-width="1"/>
  <!-- Airplane -->
  <g transform="translate(50,48) rotate(-45)">
    <path d="M0-28 C2-26 4-17 4-8 L13-3 C14.5-2.2 14.5 0 13 0.8 L4 5 C4 14 2 24 0 28 C-2 24 -4 14 -4 5 L-13 0.8 C-14.5 0 -14.5-2.2 -13-3 L-4-8 C-4-17 -2-26 0-28Z" fill="white" opacity="0.95"/>
    <!-- Tail fin -->
    <path d="M0 18 L3 24 L0 22 L-3 24Z" fill="white" opacity="0.8"/>
  </g>
  <!-- Tracking dot -->
  <circle cx="62" cy="36" r="3" fill="#48CAE4" opacity="0.9"/>
  <circle cx="62" cy="36" r="5" fill="#48CAE4" opacity="0.3"/>
</svg>
