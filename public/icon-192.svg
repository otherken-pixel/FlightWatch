  <circle cx="96" cy="96" r="50" fill="none" stroke="#48CAE4" stroke-opacity="0.18" stroke-width="1.5"/>
  <circle cx="96" cy="96" r="30" fill="none" stroke="#48CAE4" stroke-opacity="0.25" stroke-width="1.5"/>
