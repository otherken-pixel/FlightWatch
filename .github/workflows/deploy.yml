name: Deploy to Firebase Hosting

on:
  release:
    types: [published]
  push:
    branches:
      - main
      - claude/flightwatch-tracking-app-1uGzq

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Hosting
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FLIGHTWATCH_7FB60 }}' > $RUNNER_TEMP/sa_key.json
          export GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa_key.json
          firebase deploy --only hosting --project flightwatch-7fb60
          rm $RUNNER_TEMP/sa_key.json

      - name: Deploy Firestore Rules
        continue-on-error: true
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FLIGHTWATCH_7FB60 }}' > $RUNNER_TEMP/sa_key.json
          export GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa_key.json
          firebase deploy --only firestore:rules --project flightwatch-7fb60
          rm $RUNNER_TEMP/sa_key.json
